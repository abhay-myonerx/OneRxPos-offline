appId: com.onerx.rxpos
productName: RX POS

directories:
  output: dist-desktop

# ============================================================
# NATIVE MODULE BUILD
# ============================================================
#
# Native Electron modules are prepared explicitly by:
#
# scripts/rebuild-native-backend.mjs
#
# RX POS uses:
#
# better-sqlite3-multiple-ciphers
#
# This native dependency MUST be compiled/prebuilt for the
# target Electron runtime, operating system, and CPU architecture.
#
# Supported target architecture plan:
#
# Windows:
#   x64   -> Intel 64-bit + AMD Ryzen/AMD64
#   arm64 -> Windows ARM devices
#
# macOS:
#   x64   -> Intel Macs
#   arm64 -> Apple Silicon (M1/M2/M3/M4/M5)
#
# Do not let electron-builder automatically rebuild native
# dependencies because RX POS owns the native rebuild pipeline.
#
npmRebuild: false

# ============================================================
# APPLICATION FILES
# ============================================================

files:
  - out/**

  # esbuild source maps are useful locally but should not be
  # included in the packaged application.
  - "!out/**/*.map"

# ============================================================
# ASAR
# ============================================================

# Package Electron main/preload application code into app.asar.
asar: true

# ============================================================
# HARDENING
# ============================================================
#
# Renderer encryption/integrity processing.
#
# During development:
#
# RENDERER_ENCRYPTION_KEY may remain unset.
#
# harden-pack.mjs currently skips encryption when the environment
# variable is unavailable.
#
afterPack: ./scripts/harden-pack.mjs

# ============================================================
# ELECTRON LANGUAGES
# ============================================================
#
# Ship only languages supported by RX POS.
#
electronLanguages:
  - en-US
  - fr

# ============================================================
# EXTRA RESOURCES
# ============================================================

extraResources:
  # ----------------------------------------------------------
  # FRONTEND SPA
  # ----------------------------------------------------------
  #
  # Built by:
  #
  # npm run build:spa
  #
  # Served through:
  #
  # app://bundle/index.html
  #
  - from: ../frontend/dist
    to: renderer

  # ----------------------------------------------------------
  # STORE-NODE BACKEND
  # ----------------------------------------------------------
  #
  # Prepared by:
  #
  # scripts/prepare-backend-resources.mjs
  #
  # Contains the production-only backend runtime:
  #
  #   dist/
  #   node_modules/
  #   prisma/
  #
  # Runtime location:
  #
  # <process.resourcesPath>/backend
  #
  - from: .staging/backend
    to: backend

  # ----------------------------------------------------------
  # NATIVE DATABASE MODULE
  # ----------------------------------------------------------
  #
  # Target-specific Electron native build of:
  #
  # better-sqlite3-multiple-ciphers
  #
  # IMPORTANT:
  #
  # scripts/rebuild-native-backend.mjs MUST build the correct
  # binary for the current target:
  #
  # win32-x64
  # win32-arm64
  # darwin-x64
  # darwin-arm64
  #
  - from: native
    to: native
    filter:
      - package.json
      - "node_modules/**/*"

  # ----------------------------------------------------------
  # LOOSE RUNTIME SCRIPTS
  # ----------------------------------------------------------
  #
  # These files must remain outside app.asar because Electron
  # launches them through --require / argv.
  #
  - from: scripts
    to: scripts
    filter:
      - electron-native-require-hook.cjs
      - push-sqlite-schema-oneshot.cjs

# ============================================================
# WINDOWS
# ============================================================
#
# x64 supports:
#
#   Intel Core 64-bit
#   Intel Xeon 64-bit
#   AMD Ryzen
#   AMD Athlon 64-bit
#   AMD EPYC
#
# arm64 supports:
#
#   Snapdragon Windows PCs
#   Windows ARM devices
#
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64

  # ----------------------------------------------------------
  # TEMPORARY DEVELOPMENT CONFIGURATION
  # ----------------------------------------------------------
  #
  # Code signing is currently disabled for local testing.
  #
  # Remove this before production/customer release.
  #
  signAndEditExecutable: false

# ============================================================
# NSIS WINDOWS INSTALLER
# ============================================================

nsis:
  # Show installation wizard.
  oneClick: false

  # Install for current Windows user.
  #
  # Good for development and POS workstation deployment where
  # machine-wide administrator installation is not required.
  perMachine: false

  # Allow the user/technician to select installation directory.
  allowToChangeInstallationDirectory: true

  # Create Windows desktop shortcut.
  createDesktopShortcut: true

  # Create Windows Start Menu shortcut.
  createStartMenuShortcut: true

  shortcutName: RX POS

  # Keep local RX POS data when uninstalling.
  #
  # IMPORTANT for POS because local SQLite/store-node data may
  # contain unsynchronized offline transactions.
  deleteAppDataOnUninstall: false

# ============================================================
# MACOS
# ============================================================
#
# x64:
#
#   Intel Macs
#
# arm64:
#
#   Apple Silicon
#   M1
#   M2
#   M3
#   M4
#   M5 and future compatible Apple Silicon architectures
#
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64

  category: public.app-category.business

  # ----------------------------------------------------------
  # TEMPORARY DEVELOPMENT CONFIGURATION
  # ----------------------------------------------------------
  #
  # Disable automatic identity discovery while testing.
  #
  # Remove before customer/production macOS release.
  #
  identity: null

# ============================================================
# MACOS DMG
# ============================================================

dmg:
  title: RX POS

  contents:
    - x: 130
      y: 220

    - x: 410
      y: 220
      type: link
      path: /Applications
